<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビジネス系LP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- =========================================
        ヘッダー
    ========================================== -->
    <header class="header">
        <div class="header-container">
            <div class="header-logo">
                BizSchool
            </div>

            <nav class="header-nav">
                <ul class="header-nav-list">
                    <li class="header-nav-item">
                        <a href="#features">特徴</a>
                    </li>
                    <li class="header-nav-item">
                        <a href="#voice">実績</a>
                    </li>
                    <li class="header-nav-item">
                        <a href="#plan">料金</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>

        <!-- =========================================
            メインビジュアル
        ========================================== -->
        <section class="mv">
            <div class="mv-container">
                <h2 class="mv-title">
                    未経験から3ヶ月で<br>稼げるプロになる
                </h2>
                <p class="mv-sub">
                    実践型ビジネススクールで、自由な働き方を手に入れよう
                </p>
                <div class="mv-btn">
                    <a href="#" class="mv-btn-word">
                        無料体験はこちら
                    </a>
                </div>
            </div>
        </section>

        <!-- =========================================
            スクールの特徴
        ========================================== -->
        <section class="features">
            <div class="features-container">
                <h2 class="features-title">
                    BizSchoolの3つの特徴
                </h2>

                <div class="features-wrapper">
                    <div class="features-item">
                        <span class="features-num">01</span>
                        <h3 class="features-sub">
                            プロによる徹底指導
                        </h3>
                        <p class="features-text">
                            現役で活躍するビジネスのプロが、あなたの課題をマンツーマンで実戦的にサポートします。
                        </p>
                    </div>
                    <div class="features-item">
                        <span class="features-num">02</span>
                        <h3 class="features-sub">
                            現場直結のカリキュラム
                        </h3>
                        <p class="features-text">
                            教科書通りの知識ではなく、明日から現場でそのまま使えるスキルだけを凝縮して学びます。
                        </p>
                    </div>
                    <div class="features-item">
                        <span class="features-num">03</span>
                        <h3 class="features-sub">
                            充実の案件獲得サポート
                        </h3>
                        <p class="features-text">
                            卒業がゴールではありません。クラウドソーシングでの最初の案件獲得まで徹底的に伴走します。
                        </p>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
